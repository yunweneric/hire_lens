<section class="rounded-lg border bg-card p-5">
  <h2 class="text-sm font-medium">Matched</h2>
  <div class="mt-3 flex flex-wrap gap-2">
    {% for skill in matched %}
    <span class="badge-secondary">{{ skill }}</span>
    {% empty %}
    <span class="text-sm text-muted-foreground">None detected</span>
    {% endfor %}
  </div>

  <h2 class="mt-6 text-sm font-medium">Missing</h2>
  <div class="mt-3 flex flex-wrap gap-2">
    {% for skill in missing %}
    <span class="badge-outline text-destructive">{{ skill }}</span>
    {% empty %}
    <span class="text-sm text-muted-foreground">None</span>
    {% endfor %}
  </div>
</section>
