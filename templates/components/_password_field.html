<div class="flex flex-col gap-2" x-data="{ show: false }">
  <div class="flex items-center justify-between">
    {% if label %}
    <label for="{{ id }}" class="label">{{ label }}</label>
    {% endif %}
    {% if forgot_url %}
    <a href="{{ forgot_url }}" class="text-sm font-medium text-primary hover:underline">Forgot password?</a>
    {% endif %}
  </div>
  <div class="relative">
    <input
      :type="show ? 'text' : 'password'"
      id="{{ id }}"
      name="{{ name }}"
      placeholder="{{ placeholder|default:'Enter your password' }}"
      class="input pr-10 {% if error %}border-destructive focus-visible:ring-destructive{% endif %}"
      {% if required %}required{% endif %}
      autocomplete="current-password"
    />
    <button
      type="button"
      class="btn-ghost btn-icon absolute right-0 top-0 text-muted-foreground hover:text-foreground"
      @click="show = !show"
      :aria-label="show ? 'Hide password' : 'Show password'"
    >
      <svg x-show="!show" class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
      <svg x-show="show" x-cloak class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858 3.03a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
      </svg>
    </button>
  </div>
  {% if error %}
  <p class="text-xs text-destructive">{{ error }}</p>
  {% endif %}
</div>
