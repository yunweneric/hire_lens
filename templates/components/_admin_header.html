<header class="admin-header">
  <button type="button" @click="sidebarOpen = true" class="btn-ghost btn-icon -ml-1 lg:hidden" aria-label="Toggle sidebar">
    <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <div class="separator-vertical hidden lg:block"></div>
  <div class="flex min-w-0 flex-1 flex-col">
    {% if breadcrumb %}
    <nav class="flex items-center gap-1 text-sm text-muted-foreground" aria-label="Breadcrumb">
      {% for item in breadcrumb %}
        {% if not forloop.last %}
          <a href="{{ item.url }}" class="hover:text-foreground">{{ item.label }}</a>
          <span>/</span>
        {% else %}
          <span class="font-medium text-foreground">{{ item.label }}</span>
        {% endif %}
      {% endfor %}
    </nav>
    {% else %}
    <h1 class="truncate text-sm font-medium">{{ page_title|default:"Dashboard" }}</h1>
    {% endif %}
  </div>
  <div class="flex items-center gap-2">
    <a href="{% url 'admin_panel:job_create' %}" class="btn-outline btn-sm hidden md:inline-flex">New job</a>
  </div>
</header>
