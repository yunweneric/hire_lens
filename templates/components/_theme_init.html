<script>
(function(){var m=localStorage.getItem('theme');if(!m||!['system','light','dark'].includes(m))m='system';var d=m==='dark'||(m==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);if(d)document.documentElement.classList.add('dark');document.documentElement.dataset.theme=m;})();
</script>
