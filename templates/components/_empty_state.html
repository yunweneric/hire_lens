<div class="flex flex-col items-center justify-center rounded-lg border border-dashed bg-muted/30 px-6 py-12 text-center">
  {% if icon %}
  <div class="mb-4 flex size-12 items-center justify-center rounded-lg bg-primary/10 text-primary">
    {{ icon|safe }}
  </div>
  {% endif %}
  <p class="text-sm font-medium">{{ title }}</p>
  {% if description %}
  <p class="mt-1 max-w-sm text-sm text-muted-foreground">{{ description }}</p>
  {% endif %}
  {% if action_url and action_label %}
  <a href="{{ action_url }}" class="btn-primary mt-5">{{ action_label }}</a>
  {% endif %}
</div>
