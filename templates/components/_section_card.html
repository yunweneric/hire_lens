<div class="section-card">
  <div class="section-card-body">
    <p class="text-sm text-muted-foreground">{{ label }}</p>
    <div class="flex items-center justify-between gap-2 pt-1">
      <p class="text-2xl font-semibold tabular-nums tracking-tight">{{ value }}{% if suffix %}{{ suffix }}{% endif %}</p>
      {% if trend %}
      <span class="{% if trend.direction == 'up' %}trend-badge-up{% elif trend.direction == 'down' %}trend-badge-down{% else %}trend-badge-neutral{% endif %}">
        {% if trend.direction == 'up' %}+{% elif trend.direction == 'down' %}-{% endif %}{{ trend.percent }}%
      </span>
      {% endif %}
    </div>
  </div>
  {% if footer %}
  <div class="section-card-footer">{{ footer }}</div>
  {% endif %}
</div>
