<div class="chart-panel">
  <div class="mb-6 flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h2 class="text-base font-semibold">Applications over time</h2>
      <p class="text-sm text-muted-foreground">Monthly submissions for the last 6 months</p>
    </div>
    <span class="rounded-md border bg-muted/50 px-2.5 py-1 text-xs font-medium text-muted-foreground tabular-nums">
      {{ total_in_period }} total
    </span>
  </div>

  {% if chart_svg %}
  <div class="flex w-full flex-col" style="height: 220px;">
    <div class="min-h-0 flex-1 overflow-hidden">
      {{ chart_svg|safe }}
    </div>
    <div class="mt-3 flex justify-between text-[10px] text-muted-foreground">
      {% for point in chart_points %}
      <span>{{ point.label }}</span>
      {% endfor %}
    </div>
  </div>
  {% else %}
  <p class="py-16 text-center text-sm text-muted-foreground">No application data yet.</p>
  {% endif %}
</div>
