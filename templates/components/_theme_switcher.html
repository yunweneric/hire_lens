<div
  class="theme-switcher"
  x-data="{
    open: false,
    mode: window.themeManager ? window.themeManager.getMode() : 'system',
    setMode(m) { this.mode = m; window.themeManager.setMode(m); this.open = false; },
    label() {
      return { system: 'System', light: 'Light', dark: 'Dark' }[this.mode] || 'System';
    }
  }"
  @theme-change.window="mode = $event.detail.mode"
  @click.outside="open = false"
>
  <button
    type="button"
    @click="open = !open"
    class="theme-switcher-trigger"
    :aria-expanded="open"
    aria-haspopup="listbox"
  >
    <svg x-show="mode === 'system'" class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    <svg x-show="mode === 'light'" x-cloak class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    <svg x-show="mode === 'dark'" x-cloak class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
    <span x-text="label()"></span>
    <svg class="size-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
  </button>
  <div x-show="open" x-cloak x-transition class="theme-switcher-menu {% if dropup %}theme-switcher-menu-up{% else %}theme-switcher-menu-down{% endif %} z-50" role="listbox">
    <button type="button" role="option" @click="setMode('system')" class="theme-switcher-item" :class="{ 'is-active': mode === 'system' }">
      <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      System
      <svg x-show="mode === 'system'" class="ml-auto size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </button>
    <button type="button" role="option" @click="setMode('light')" class="theme-switcher-item" :class="{ 'is-active': mode === 'light' }">
      <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      Light
      <svg x-show="mode === 'light'" class="ml-auto size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </button>
    <button type="button" role="option" @click="setMode('dark')" class="theme-switcher-item" :class="{ 'is-active': mode === 'dark' }">
      <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      Dark
      <svg x-show="mode === 'dark'" class="ml-auto size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </button>
  </div>
</div>
