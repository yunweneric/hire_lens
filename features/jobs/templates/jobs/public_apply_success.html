{% extends "layouts/public.html" %}

{% block content %}
<div class="mx-auto max-w-lg py-8 text-center">
  <div class="surface p-10">
    <div class="mx-auto mb-5 flex size-14 items-center justify-center rounded-full bg-success/10 text-success">
      <svg class="size-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="text-2xl font-bold tracking-tight">Application received</h1>
    <p class="mx-auto mt-3 max-w-sm text-muted-foreground">
      Thanks for applying to <strong class="text-foreground">{{ job.title }}</strong>. We'll review your submission and be in touch if there's a match.
    </p>
    <div class="mt-8 flex flex-col items-center justify-center gap-2 sm:flex-row">
      <a href="{% url 'jobs:public_list' %}" class="btn-brand">Browse more roles</a>
    </div>
  </div>
</div>
{% endblock %}
